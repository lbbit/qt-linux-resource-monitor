name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
      ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1:check_initialization_order=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/ci/lsan.supp:print_suppressions=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtbase5-dev \
            qtbase5-dev-tools \
            qtchooser \
            qt5-qmake \
            g++ \
            valgrind \
            xvfb

      - name: Build default
        run: |
          qmake qt-linux-resource-monitor.pro
          make -j"$(nproc)"

      - name: Run unit tests
        run: |
          xvfb-run -a ./tests/tst_monitor -txt

      - name: Build with sanitizers
        run: |
          make distclean || true
          qmake \
            QMAKE_CXXFLAGS+="-O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined" \
            QMAKE_LFLAGS+="-fsanitize=address,undefined" \
            qt-linux-resource-monitor.pro
          make -j"$(nproc)"

      - name: Run sanitizer tests
        run: |
          chmod +x scripts/run_memory_check.sh
          ./scripts/run_memory_check.sh

      - name: Rebuild for Valgrind
        run: |
          make distclean || true
          qmake \
            QMAKE_CXXFLAGS+="-O1 -g -fno-omit-frame-pointer" \
            qt-linux-resource-monitor.pro
          make -j"$(nproc)"

      - name: Run Valgrind Memcheck
        run: |
          chmod +x scripts/run_valgrind_memcheck.sh
          ./scripts/run_valgrind_memcheck.sh

  aarch64-cross-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image for aarch64 cross compile
        run: |
          docker build -t qt-linux-resource-monitor-aarch64-cross -f docker/aarch64-cross/Dockerfile .

      - name: Build Qt aarch64 toolchain in container
        run: |
          docker run --rm qt-linux-resource-monitor-aarch64-cross /usr/local/bin/build_qt_cross.sh

      - name: Cross build ARM64 normal binary
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace qt-linux-resource-monitor-aarch64-cross bash -lc 'chmod +x scripts/build_aarch64_release.sh && ./scripts/build_aarch64_release.sh normal dist/qt-linux-resource-monitor-linux-aarch64'

      - name: Cross build ARM64 ASan binary
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace qt-linux-resource-monitor-aarch64-cross bash -lc 'chmod +x scripts/build_aarch64_release.sh && ./scripts/build_aarch64_release.sh asan dist/qt-linux-resource-monitor-linux-aarch64-memory-check'

      - name: Verify ARM64 artifacts
        run: |
          test -f dist/qt-linux-resource-monitor-linux-aarch64/bin/qt_linux_resource_monitor
          test -f dist/qt-linux-resource-monitor-linux-aarch64/runtime/ld-linux-aarch64.so.1
          test -f dist/qt-linux-resource-monitor-linux-aarch64-memory-check/bin/qt_linux_resource_monitor_asan
